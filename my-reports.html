<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Reports — Vet INC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563eb;--blue-light:#60a5fa;--blue-dim:#eff6ff;--blue-border:#dbeafe;--navy:#1e3a5f;--muted:#64748b;--bg:#f0f6ff;--white:#fff;--green:#16a34a;--red:#ef4444;--amber:#d97706;}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh}

nav{background:var(--white);border-bottom:1px solid var(--blue-border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--blue-light));border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-logo-text{font-size:1rem;font-weight:800;color:var(--navy)}.nav-logo-text span{color:var(--blue)}
.nav-actions{display:flex;gap:8px}
.nav-link{text-decoration:none;color:var(--muted);font-size:.82rem;font-weight:500;padding:6px 12px;border-radius:7px;transition:all .15s;border:1px solid var(--blue-border)}
.nav-link:hover{background:var(--blue-dim);color:var(--blue)}

.page{max-width:1100px;margin:0 auto;padding:36px 24px 80px}

/* REPORT LIST */
.page-header{margin-bottom:28px}
.page-title{font-size:1.6rem;font-weight:900;color:var(--navy);margin-bottom:4px}
.page-sub{font-size:.88rem;color:var(--muted)}

.report-list{display:flex;flex-direction:column;gap:12px;margin-bottom:40px}
.report-item{background:var(--white);border:1px solid var(--blue-border);border-radius:14px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;transition:all .2s}
.report-item:hover{border-color:var(--blue);box-shadow:0 2px 12px rgba(37,99,235,.08);transform:translateX(3px)}
.report-item.active{border-color:var(--blue);background:var(--blue-dim)}
.ri-left{display:flex;align-items:center;gap:14px}
.ri-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue-light));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ri-icon svg{opacity:.9}
.ri-clinic{font-size:.95rem;font-weight:700;color:var(--navy)}
.ri-meta{font-size:.76rem;color:var(--muted);margin-top:2px}
.ri-stats{display:flex;gap:16px;flex-shrink:0}
.ri-stat{text-align:right}
.ri-stat-val{font-size:1rem;font-weight:800;color:var(--blue)}
.ri-stat-val.green{color:var(--green)}
.ri-stat-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ri-arrow{color:var(--muted);font-size:1.2rem;flex-shrink:0}

.empty-state{text-align:center;padding:64px 24px;background:var(--white);border:1px solid var(--blue-border);border-radius:16px}
.empty-icon{font-size:2.5rem;margin-bottom:14px;opacity:.4}
.empty-title{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:6px}
.empty-sub{font-size:.85rem;color:var(--muted);margin-bottom:20px}
.btn-primary{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--blue),var(--blue-light));color:#fff;text-decoration:none;padding:11px 22px;border-radius:9px;font-size:.88rem;font-weight:700;transition:all .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,99,235,.3)}

/* REPORT DETAIL */
.report-detail{display:none}
.report-detail.visible{display:block}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.detail-back{background:none;border:1px solid var(--blue-border);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.detail-back:hover{border-color:var(--blue);color:var(--blue)}
.detail-actions{display:flex;gap:8px}
.btn-pdf{background:linear-gradient(135deg,var(--blue),var(--blue-light));color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-pdf:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(37,99,235,.3)}
.btn-csv{background:var(--white);color:var(--blue);border:1px solid var(--blue-border);padding:9px 18px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-csv:hover{border-color:var(--blue);background:var(--blue-dim)}
.btn-del{background:none;color:var(--muted);border:1px solid var(--blue-border);padding:9px 14px;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-del:hover{border-color:var(--red);color:var(--red)}

.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.summary-card{background:var(--white);border:1px solid var(--blue-border);border-radius:12px;padding:16px;text-align:center}
.sv{font-size:1.5rem;font-weight:900;color:var(--blue)}.sv.green{color:var(--green)}.sv.red{color:var(--red)}
.sl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.hero-lost{background:linear-gradient(135deg,rgba(22,163,74,.1),rgba(22,163,74,.04));border:1px solid rgba(22,163,74,.2);border-radius:14px;padding:20px;text-align:center;margin-bottom:20px}
.hero-num{font-size:2.2rem;font-weight:900;color:var(--green)}
.hero-label{font-size:.8rem;color:var(--muted);margin-top:4px}

.table-wrap{background:var(--white);border:1px solid var(--blue-border);border-radius:14px;overflow:hidden}
.table-header{padding:14px 20px;border-bottom:1px solid var(--blue-border);font-size:.88rem;font-weight:700;color:var(--navy)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f0f6ff;padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--blue-border);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #f0f6ff;vertical-align:middle;background:var(--white)}
tr:last-child td{border-bottom:none}tr:hover td{background:#f8faff}
.pill{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600}
.pill-red{background:rgba(239,68,68,.1);color:var(--red)}
.pill-amber{background:rgba(245,158,11,.1);color:var(--amber)}
.pill-green{background:rgba(22,163,74,.1);color:var(--green)}
.pill-blue{background:var(--blue-dim);color:var(--blue)}
.td-green{color:var(--green);font-weight:700}
.td-muted{color:var(--muted)}
.td-name{font-weight:600;color:var(--navy)}

@media print{
  nav,.detail-back,.detail-actions,.report-list,.page-header,.btn-del{display:none!important}
  body{background:#fff}
  .report-detail{display:block!important}
  .table-wrap{border:none}
  .print-header{display:block!important}
}
.print-header{display:none;text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--blue)}
.print-header h2{font-size:1.3rem;font-weight:900;color:var(--navy)}
.print-header p{font-size:.8rem;color:var(--muted);margin-top:4px}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <div class="nav-logo-text">Vet <span>INC</span></div>
  </a>
  <div class="nav-actions">
    <a class="nav-link" href="price-analyzer.html">+ New Analysis</a>
    <a class="nav-link" href="reports.html">Reports</a>
  </div>
</nav>

<div class="page">

  <!-- REPORT LIST VIEW -->
  <div id="list-view">
    <div class="page-header">
      <div class="page-title">My Reports</div>
      <div class="page-sub">All your saved price analysis reports, newest first.</div>
    </div>
    <div id="report-list-container"></div>
  </div>

  <!-- REPORT DETAIL VIEW -->
  <div class="report-detail" id="detail-view">
    <div class="print-header" id="print-header">
      <h2 id="print-title"></h2>
      <p id="print-date-line"></p>
    </div>
    <div class="detail-header">
      <button class="detail-back" onclick="showList()">← Back to Reports</button>
      <div class="detail-actions">
        <button class="btn-csv" onclick="exportCurrentCSV()">↓ Export CSV</button>
        <button class="btn-pdf" onclick="savePDF()">↓ Save as PDF</button>
        <button class="btn-del" onclick="deleteCurrentReport()" title="Delete report">🗑</button>
      </div>
    </div>
    <div id="detail-content"></div>
  </div>

</div>

<script>
let currentReport = null;

function loadReports() {
  try { return JSON.parse(localStorage.getItem('vs_reports') || '[]'); } catch { return []; }
}

function saveReports(reports) {
  localStorage.setItem('vs_reports', JSON.stringify(reports));
}

function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').classList.remove('visible');
  currentReport = null;
  renderList();
}

function renderList() {
  const reports = loadReports();
  const container = document.getElementById('report-list-container');

  if (reports.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No reports yet</div>
        <div class="empty-sub">Run a price analysis and your report will appear here automatically.</div>
        <a class="btn-primary" href="price-analyzer.html">Run Your First Report →</a>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="report-list">${reports.map((r, i) => `
    <div class="report-item" onclick="openReport(${i})">
      <div class="ri-left">
        <div class="ri-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        </div>
        <div>
          <div class="ri-clinic">${esc(r.clinic)}</div>
          <div class="ri-meta">${r.date} · ${r.totalStale} stale services${r.pms ? ' · ' + r.pms.charAt(0).toUpperCase()+r.pms.slice(1) : ''}</div>
        </div>
      </div>
      <div class="ri-stats">
        ${r.totalLost > 0 ? `<div class="ri-stat"><div class="ri-stat-val green">$${r.totalLost.toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0})}</div><div class="ri-stat-label">Lost Revenue</div></div>` : ''}
        <div class="ri-stat"><div class="ri-stat-val">${r.totalStale}</div><div class="ri-stat-label">Flagged</div></div>
      </div>
      <div class="ri-arrow">›</div>
    </div>`).join('')}
  </div>`;
}

function openReport(index) {
  const reports = loadReports();
  currentReport = reports[index];
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').classList.add('visible');
  renderDetail(currentReport);
}

function openReportById(id) {
  const reports = loadReports();
  const idx = reports.findIndex(r => r.id === id);
  if (idx >= 0) openReport(idx);
  else showList();
}

function renderDetail(r) {
  document.getElementById('print-title').textContent = r.clinic + ' — Inflation Adjustment Report';
  document.getElementById('print-date-line').textContent = 'Generated ' + r.date + ' · Vet INC';

  const totalLost = r.results.reduce((s, x) => s + (x.lostRev || 0), 0);
  const max8 = r.results.filter(x => x.yrs >= 8).length;
  const maxDays = r.results.reduce((m, x) => Math.max(m, x.daysSince || 0), 0);

  function pillClass(y) { if (!y) return 'pill-blue'; if (y >= 8) return 'pill-red'; if (y >= 5) return 'pill-amber'; return 'pill-green'; }

  document.getElementById('detail-content').innerHTML = `
    <div style="margin-bottom:6px">
      <div style="font-size:1.3rem;font-weight:900;color:var(--navy)">${esc(r.clinic)}</div>
      <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${r.date}${r.pms ? ' · ' + r.pms.charAt(0).toUpperCase()+r.pms.slice(1) : ''}</div>
    </div>

    ${totalLost > 0 ? `<div class="hero-lost" style="margin-top:16px"><div class="hero-num">$${totalLost.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="hero-label">Estimated revenue left on the table in the last 12 months</div></div>` : ''}

    <div class="summary-cards" style="margin-top:16px">
      <div class="summary-card"><div class="sv">${r.totalStale}</div><div class="sl">Stale Services</div></div>
      <div class="summary-card"><div class="sv red">${max8}</div><div class="sl">8+ Years Old</div></div>
      <div class="summary-card"><div class="sv">${maxDays > 0 ? Math.round(maxDays/365)+'yr' : '—'}</div><div class="sl">Longest Gap</div></div>
    </div>

    <div class="table-wrap">
      <div class="table-header">All Stale Services (${r.results.length})</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Service</th>
            <th style="text-align:right">Current $</th>
            <th>Last Changed</th>
            <th style="text-align:right">Days</th>
            <th>Age</th>
            <th>Inflation</th>
            <th>Suggested $</th>
            <th>Gap</th>
            ${r.hasSales ? '<th style="text-align:right">Lost Rev.</th>' : ''}
          </tr></thead>
          <tbody>${r.results.map(x => `<tr>
            <td class="td-name">${esc(x.desc)} <span class="td-muted" style="font-size:10px;font-weight:400">${esc(x.id)}</span></td>
            <td style="text-align:right;color:var(--blue)">$${x.price.toFixed(2)}</td>
            <td class="td-muted">${x.lastChanged}</td>
            <td class="td-muted" style="text-align:right">${x.daysSince != null ? x.daysSince.toLocaleString() : '—'}</td>
            <td><span class="pill ${pillClass(x.yrs)}">${x.yrs ? x.yrs + 'yr' : 'No record'}</span></td>
            <td style="color:var(--amber)">${x.inf != null ? '+' + x.inf + '%' : '—'}</td>
            <td style="font-weight:700">${x.sug != null ? '$' + x.sug.toFixed(2) : '—'}</td>
            <td class="td-green">${x.diff != null ? '+$' + x.diff.toFixed(2) : '—'}</td>
            ${r.hasSales ? `<td class="td-green" style="text-align:right">${x.lostRev != null ? '+$' + x.lostRev.toLocaleString('en-CA', {minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</td>` : ''}
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function savePDF() {
  window.print();
}

function exportCurrentCSV() {
  if (!currentReport) return;
  const r = currentReport;
  const clinic = r.clinic.replace(/[^a-z0-9]/gi, '-').toLowerCase();
  const rows = [['Item ID','Description','Current Price','Last Changed','Days Since','Years Since','Inflation %','Suggested Price','Per Unit Gap'].concat(r.hasSales ? ['Lost Revenue'] : [])];
  for (const x of r.results) {
    const row = [x.id, x.desc, '$'+x.price.toFixed(2), x.lastChanged, x.daysSince||'', x.yrs||'', x.inf!=null?x.inf+'%':'', x.sug!=null?'$'+x.sug.toFixed(2):'', x.diff!=null?'$'+x.diff.toFixed(2):''];
    if (r.hasSales) row.push(x.lostRev != null ? '$'+x.lostRev.toFixed(2) : '');
    rows.push(row);
  }
  const csv = rows.map(row => row.map(v => '"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'vet-inc-' + clinic + '-' + r.timestamp.slice(0,10) + '.csv';
  a.click();
}

function deleteCurrentReport() {
  if (!currentReport) return;
  if (!confirm('Delete this report? This cannot be undone.')) return;
  const reports = loadReports().filter(r => r.id !== currentReport.id);
  saveReports(reports);
  showList();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init
const params = new URLSearchParams(window.location.search);
const openId = params.get('id');
if (openId) {
  openReportById(openId);
} else {
  showList();
}
</script>
</body>
</html>
