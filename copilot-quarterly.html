<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quarterly Report — Copilot Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue-light:#60a5fa;--blue-bg:#eff6ff;--blue-border:#dbeafe;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --ink:#0f172a;--ink2:#334155;--dim:#64748b;--dimmer:#94a3b8;
  --bg:#f8fafc;--white:#fff;--line:#e2e8f0;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
.report{max-width:800px;margin:0 auto;padding:32px 24px}

.copilot-banner{background:linear-gradient(135deg,var(--blue),var(--blue-light));border-radius:14px;padding:20px;color:#fff;margin-bottom:20px}
.copilot-banner h2{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.copilot-banner p{font-size:.82rem;opacity:.85}
.copilot-mode-tag{display:inline-block;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

.header{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:28px;margin-bottom:20px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header-logo{font-size:1.2rem;font-weight:800;letter-spacing:-.5px}
.header-logo span{color:var(--blue)}
.header-badge{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--green);background:var(--green-bg);padding:5px 12px;border-radius:20px;border:1px solid #bbf7d0}
.header h1{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.header-meta{font-size:.8rem;color:var(--dim)}
.header-meta span{margin-right:16px}

.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
@media(max-width:600px){.summary-grid{grid-template-columns:repeat(2,1fr)}}
.summary-card{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:16px}
.summary-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--dimmer);margin-bottom:6px}
.summary-value{font-size:1.4rem;font-weight:800;letter-spacing:-.5px}
.summary-value.green{color:var(--green)}
.summary-value.blue{color:var(--blue)}
.summary-sub{font-size:.7rem;color:var(--dim);margin-top:2px}

.section{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:20px}
.section-title{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.section-desc{font-size:.8rem;color:var(--dim);margin-bottom:16px}

.table{width:100%;border-collapse:collapse;font-size:.82rem}
.table th{text-align:left;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--dimmer);padding:8px 10px;border-bottom:2px solid var(--line)}
.table th.num{text-align:right}
.table td{padding:10px;border-bottom:1px solid var(--line)}
.table td.num{text-align:right;font-variant-numeric:tabular-nums}
.table tr:last-child td{border-bottom:none}
.code{font-family:'SF Mono',Monaco,monospace;font-size:.78rem;font-weight:600;color:var(--ink2)}
.price-old{color:var(--dim);text-decoration:line-through;font-size:.78rem}
.price-new{font-weight:700;color:var(--ink)}
.change-pct{font-size:.75rem;font-weight:600;padding:2px 7px;border-radius:5px}
.change-up{background:var(--green-bg);color:var(--green)}
.change-down{background:var(--red-bg);color:var(--red)}
.impact{font-weight:700;color:var(--green)}

.action-row{display:flex;gap:8px;margin-top:16px}
.btn{padding:9px 20px;border-radius:8px;font-size:.82rem;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:.15s}
.btn-approve-all{background:var(--ink);color:#fff}
.btn-approve-all:hover{background:var(--blue)}
.btn-reject{background:var(--white);color:var(--dim);border:1px solid var(--line)}
.btn-reject:hover{background:var(--bg);color:var(--ink2)}

.result-row{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
.result-row:last-child{border:none}
.result-label{font-size:.85rem;color:var(--ink2)}
.result-value{font-size:.95rem;font-weight:700}
.result-value.up{color:var(--green)}
.result-value.flat{color:var(--dim)}

.alert{border-radius:10px;padding:16px;margin-bottom:16px;font-size:.85rem}
.alert-warn{background:var(--amber-bg);border:1px solid #fde68a;color:#92400e}

.footer{text-align:center;padding:24px 0;font-size:.75rem;color:var(--dimmer)}
.footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<div class="report" id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════
// DATA — Swap this object, report updates automatically
// ══════════════════════════════════════════════════════════════
const DATA = {
  mode: "copilot",
  clinic: {
    name: "Rosslyn Veterinary Hospital",
    location: "Edmonton, AB",
    pms: "AVImark",
    quarter: "Q2 2026",
    period: "Quarter ending June 30, 2026"
  },
  summary: {
    activeCodes: 247,
    activeSub: "231 services · 16 Rx",
    flagged: 18,
    flaggedSub: "7.3% of total",
    opportunity: "+$18,400",
    opportunitySub: "estimated annual",
    avgDaysSince: 412,
    avgDaysSub: "↓ from 847 last quarter"
  },
  // Suggested changes — sorted by impact (desc)
  suggestedChanges: [
    { code: "EX001", desc: "Comprehensive Physical Exam",       current: 68.00,  suggested: 78.00,  annualImpact: 4200, lastChanged: "412 days ago", checked: true },
    { code: "VX005", desc: "Rabies Vaccine — 1yr",              current: 32.00,  suggested: 36.00,  annualImpact: 3100, lastChanged: "389 days ago", checked: true },
    { code: "DX012", desc: "Digital Radiograph — Single View",  current: 95.00,  suggested: 110.00, annualImpact: 2800, lastChanged: "501 days ago", checked: true },
    { code: "LB003", desc: "CBC + Chemistry Panel",             current: 120.00, suggested: 132.00, annualImpact: 2400, lastChanged: "356 days ago", checked: true },
    { code: "SX001", desc: "Feline Neuter",                     current: 245.00, suggested: 268.00, annualImpact: 1900, lastChanged: "298 days ago", checked: true },
    { code: "VX012", desc: "DHPP Vaccine",                      current: 28.00,  suggested: 32.00,  annualImpact: 1600, lastChanged: "445 days ago", checked: true },
    { code: "EX015", desc: "Recheck Examination",               current: 45.00,  suggested: 52.00,  annualImpact: 1200, lastChanged: "267 days ago", checked: false },
    { code: "MD008", desc: "Ear Cytology",                      current: 38.00,  suggested: 44.00,  annualImpact: 900,  lastChanged: "530 days ago", checked: false },
  ],
  // Last quarter results
  lastQuarter: {
    revenueChange: "+8.2%",
    visitVolume: "No change ✓",
    codesPerformedWell: "11 of 12",
    codesAdjustedBack: 1,
    netCaptured: "+$12,840"
  },
  // Watching list — not changing yet
  watching: [
    { code: "SX022", desc: "Declaw (front only)",       current: 180.00, suggested: 210.00, reason: "Usage down 40% YoY — may be phasing out" },
    { code: "MD015", desc: "OFA Hip Radiograph",        current: 220.00, suggested: 245.00, reason: "Only 3 visits in 90 days — low sample" },
    { code: "RX045", desc: "Apoquel 16mg (30 ct)",      current: 85.00,  suggested: 92.00,  reason: "Clients sensitive to Rx price increases — watching" },
  ],
  // Optional alert
  alert: {
    text: "12 codes haven't been updated in 2+ years. Combined estimated revenue drain: ~$8,400/year. Consider a broader review next quarter."
  }
};

// ══════════════════════════════════════════════════════════════
// RENDER — don't touch below unless changing layout
// ══════════════════════════════════════════════════════════════

function fmt(n) { return '$' + n.toFixed(2); }
function pct(oldP, newP) { 
  const v = ((newP - oldP) / oldP * 100); 
  const cls = v > 0 ? 'change-up' : 'change-down';
  return `<span class="change-pct ${cls}">${v > 0 ? '+' : ''}${v.toFixed(1)}%</span>`;
}

const d = DATA;
const c = d.clinic;
const s = d.summary;

let html = `
<div class="copilot-banner">
  <div class="copilot-mode-tag">🚗 Copilot Mode — Interactive Review</div>
  <h2>Your ${c.quarter} fee schedule review is ready</h2>
  <p>Review the suggested changes below. Approve what looks right, reject what doesn't. Takes about 5 minutes.</p>
</div>

<div class="header">
  <div class="header-top">
    <div class="header-logo">Vet <span>INC</span></div>
    <div class="header-badge">${c.quarter} Review</div>
  </div>
  <h1>${c.name}</h1>
  <div class="header-meta">
    <span>📍 ${c.location}</span>
    <span>📅 ${c.period}</span>
    <span>🔑 PMS: ${c.pms}</span>
  </div>
</div>

<div class="summary-grid">
  <div class="summary-card">
    <div class="summary-label">Active Codes</div>
    <div class="summary-value">${s.activeCodes}</div>
    <div class="summary-sub">${s.activeSub}</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Flagged for Review</div>
    <div class="summary-value blue">${s.flagged}</div>
    <div class="summary-sub">${s.flaggedSub}</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Revenue Opportunity</div>
    <div class="summary-value green">${s.opportunity}</div>
    <div class="summary-sub">${s.opportunitySub}</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Avg Days Since Update</div>
    <div class="summary-value">${s.avgDaysSince}</div>
    <div class="summary-sub">${s.avgDaysSub}</div>
  </div>
</div>

<div class="section">
  <div class="section-title">Suggested Changes</div>
  <div class="section-desc">These codes have drifted below market rates. Sorted by estimated revenue impact.</div>
  <table class="table">
    <thead>
      <tr>
        <th>Code</th>
        <th>Description</th>
        <th class="num">Current</th>
        <th class="num">Suggested</th>
        <th class="num">Change</th>
        <th class="num">Annual Impact</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
`;

d.suggestedChanges.forEach(item => {
  const checkedAttr = item.checked ? 'checked' : '';
  const totalImpact = (item.suggested - item.current) * (item.annualImpact / (item.suggested - item.current));
  html += `
      <tr>
        <td><span class="code">${item.code}</span></td>
        <td>${item.desc}</td>
        <td class="num"><span class="price-old">${fmt(item.current)}</span></td>
        <td class="num"><span class="price-new">${fmt(item.suggested)}</span></td>
        <td class="num">${pct(item.current, item.suggested)}</td>
        <td class="num"><span class="impact">+$${item.annualImpact.toLocaleString()}</span></td>
        <td><input type="checkbox" data-impact="${item.annualImpact}" ${checkedAttr}/></td>
      </tr>`;
});

// Calculate total of checked items
const checkedTotal = d.suggestedChanges.filter(i => i.checked).reduce((sum, i) => sum + i.annualImpact, 0);

html += `
    </tbody>
  </table>
  <div class="action-row">
    <button class="btn btn-approve-all" id="approveBtn">Approve ${d.suggestedChanges.filter(i=>i.checked).length} Selected (+$${checkedTotal.toLocaleString()})</button>
    <button class="btn btn-reject">Reject Selected</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Last Quarter's Results</div>
  <div class="section-desc">How the changes from last quarter performed over the past 90 days.</div>
  <div class="result-row"><div class="result-label">Revenue on changed codes</div><div class="result-value up">${d.lastQuarter.revenueChange}</div></div>
  <div class="result-row"><div class="result-label">Visit volume on changed codes</div><div class="result-value flat">${d.lastQuarter.visitVolume}</div></div>
  <div class="result-row"><div class="result-label">Codes that performed well</div><div class="result-value">${d.lastQuarter.codesPerformedWell}</div></div>
  <div class="result-row"><div class="result-label">Codes adjusted back (overpriced)</div><div class="result-value">${d.lastQuarter.codesAdjustedBack}</div></div>
  <div class="result-row"><div class="result-label">Net revenue captured</div><div class="result-value up">${d.lastQuarter.netCaptured}</div></div>
</div>

<div class="section">
  <div class="section-title">Watching — No Action Needed Yet</div>
  <div class="section-desc">These codes looked underpriced but we're holding off.</div>
  <table class="table">
    <thead><tr><th>Code</th><th>Description</th><th class="num">Current</th><th class="num">Suggested</th><th>Reason for Holding</th></tr></thead>
    <tbody>
`;

d.watching.forEach(item => {
  html += `
      <tr>
        <td><span class="code">${item.code}</span></td>
        <td>${item.desc}</td>
        <td class="num">${fmt(item.current)}</td>
        <td class="num">${fmt(item.suggested)}</td>
        <td style="font-size:.8rem;color:var(--dim)">${item.reason}</td>
      </tr>`;
});

html += `
    </tbody>
  </table>
</div>
`;

if (d.alert) {
  html += `<div class="alert alert-warn"><strong>⚠️ ${d.alert.text}</strong></div>`;
}

html += `
<div class="footer">
  <p>Generated by Vet INC · ${new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'})} · <a href="#">Download as PDF</a> · <a href="#">Email to clinic</a></p>
  <p style="margin-top:6px">Questions? jack@vetinc.ca · 780-904-3599</p>
</div>
`;

document.getElementById('app').innerHTML = html;

// Checkbox interactivity
document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    const checked = [...document.querySelectorAll('input[type="checkbox"]:checked')];
    const total = checked.reduce((sum, el) => sum + parseInt(el.dataset.impact), 0);
    const btn = document.getElementById('approveBtn');
    btn.textContent = `Approve ${checked.length} Selected (+$${total.toLocaleString()})`;
  });
});
</script>
</body>
</html>
